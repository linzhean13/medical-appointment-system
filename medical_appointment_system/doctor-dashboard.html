<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>醫師後台 - 醫療預約系統</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <header>
      <h1>醫師後台管理</h1>
      <nav>
        <a href="edit-schedule.html">修改班表</a>
        <a href="check-appointments.html">查詢預約人數</a>
        <a href="#" onclick="logout()">登出</a>
      </nav>
    </header>

    <main>
      <section>
        <h2>歡迎，醫師</h2>
        <p>請透過上方選單管理您的班表與預約資訊。</p>
      </section>

      <section id="doctorInfo">
        <h2>您的基本資料</h2>
        <p><strong>姓名：</strong><span id="doctorName">載入中...</span></p>
        <p><strong>科別：</strong><span id="specialty">載入中...</span></p>
        <p><strong>簡介：</strong><span id="bio">載入中...</span></p>
      </section>
    </main>

    <footer>
      <p>聯絡電話：02-12345678 | 地址：台北市某某路 88 號</p>
    </footer>

    <script>
      const user_id = localStorage.getItem('user_id');
      const username = localStorage.getItem('username');
      const role = localStorage.getItem('role');

      if (!user_id || role !== 'doctor') {
        alert('請以醫師身份登入');
        window.location.href = 'login.html';
      }

      function logout() {
        localStorage.clear();
        alert('您已登出');
        window.location.href = 'login.html';
      }

      // 取得醫師資料
      fetch(`get_doctor_profile.php?user_id=${user_id}`)
        .then(res => res.json())
        .then(data => {
          document.getElementById('doctorName').textContent = data.name || '無資料';
          document.getElementById('specialty').textContent = data.specialty || '未設定';
          document.getElementById('bio').textContent = data.bio || '尚無簡介';
        })
        .catch(() => {
          document.getElementById('doctorName').textContent = '載入錯誤';
          document.getElementById('specialty').textContent = '錯誤';
          document.getElementById('bio').textContent = '錯誤';
        });
    </script>
  </div>
</body>
</html>
